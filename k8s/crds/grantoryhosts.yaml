apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: grantoryhosts.grantory.ansgar.tasler.net
spec:
  group: grantory.ansgar.tasler.net
  scope: Namespaced
  names:
    plural: grantoryhosts
    singular: grantoryhost
    kind: GrantoryHost
    shortNames:
      - ghost
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: ID
          type: string
          jsonPath: .status.id
        - name: UniqueKey
          type: string
          jsonPath: .spec.uniqueKey
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              properties:
                uniqueKey:
                  type: string
                  description: Optional unique key used to enforce host uniqueness in Grantory.
                grantoryHostID:
                  type: string
                  description: Optional Grantory host ID to import and manage.
                labels:
                  type: object
                  additionalProperties:
                    type: string
                  description: Optional labels to attach to the host.
                deleteOnRemoval:
                  type: boolean
                  default: false
                  description: Delete the Grantory host when this resource is deleted.
            status:
              type: object
              properties:
                id:
                  type: string
                  description: The Grantory host ID managed by the controller.
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
