apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: grantoryregisters.grantory.ansgar.tasler.net
spec:
  group: grantory.ansgar.tasler.net
  scope: Namespaced
  names:
    plural: grantoryregisters
    singular: grantoryregister
    kind: GrantoryRegister
    shortNames:
      - greg
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: ID
          type: string
          jsonPath: .status.id
        - name: Host
          type: string
          jsonPath: .spec.hostID
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              properties:
                hostID:
                  type: string
                  description: Grantory host ID that owns the register entry.
                hostRef:
                  type: object
                  description: Reference to a GrantoryHost resource.
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                uniqueKey:
                  type: string
                  description: Optional unique key used to enforce register uniqueness in Grantory.
                schemaDefinitionID:
                  type: string
                  description: Optional schema definition used to validate register payloads.
                payload:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: JSON payload describing the register entry.
                labels:
                  type: object
                  additionalProperties:
                    type: string
                  description: Optional labels to attach to the register entry.
                deleteOnRemoval:
                  type: boolean
                  default: false
                  description: Delete the Grantory register entry when this resource is deleted.
            status:
              type: object
              properties:
                id:
                  type: string
                  description: The Grantory register ID managed by the controller.
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
