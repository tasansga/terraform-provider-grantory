default_install_hook_types:
  - pre-commit

fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: [--severity=error]
  - repo: local
    hooks:
      - id: go-govulncheck
        name: govulncheck
        entry: govulncheck ./...
        language: system
        pass_filenames: false
      - id: ensure-docs-generated
        name: Ensure docs/ is present
        entry: bash -c 'test -d docs && test -f docs/index.md'
        language: system
        pass_filenames: false
      - id: make
        name: Run make
        entry: make
        language: system
        pass_filenames: false
        always_run: true
